name: Deploy to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  CLUSTER_NAME: ${{ secrets.GKE_CLUSTER }}
  CLUSTER_ZONE: ${{ secrets.GKE_ZONE }}

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build Docker Image
      run: |
        docker build \
        -t us-central1-docker.pkg.dev/$PROJECT_ID/gke-notes-repo/gke-notes-api:${{ github.sha }} \
        ./app

    - name: Push Image
      run: |
        docker push \
        us-central1-docker.pkg.dev/$PROJECT_ID/gke-notes-repo/gke-notes-api:${{ github.sha }}

    - name: Get GKE Credentials
      run: |
        gcloud container clusters get-credentials \
        $CLUSTER_NAME \
        --zone $CLUSTER_ZONE

    - name: Update Deployment
      run: |
        kubectl set image deployment/echo-server \
        echo-server=us-central1-docker.pkg.dev/$PROJECT_ID/gke-notes-repo/gke-notes-api:${{ github.sha }} \
        -n notes-app

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/echo-server -n notes-app